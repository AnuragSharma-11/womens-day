<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>For My Love Anushree ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff6f8, #ffeef3, #fdf7ff);
            overflow: hidden;
        }

        /* Floating Hearts */

        .heart {
            position: absolute;
            color: #ffb6c1;
            /* light pink hearts */
            font-size: 24px;
            animation: float 7s linear infinite;
            opacity: 0.95;

            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35)) drop-shadow(0 0 12px rgba(255, 105, 180, 0.6));
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
            }

            100% {
                transform: translateY(-10vh) scale(1.6);
            }
        }

        /* Button */

        button {
            padding: 18px 40px;
            font-size: 20px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(45deg, #ff6b81, #ff9a9e);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.08);
        }

        /* Card */

        #wish {
            display: none;
            text-align: center;
            padding: 45px;
            width: 420px;
            border-radius: 22px;

            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);

            animation: pop 0.6s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Photo */

        .photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 15px;
        }

        /* Text */

        h1 {
            color: #ff4d6d;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #444;
        }

        .name {
            color: #ff2e63;
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>

<body>

    <div id="btn">
        <button onclick="showWish()">Open Your Surprise 💝</button>
    </div>

    <div id="wish">

        <img src="anushree.png" class="photo">

        <h1>Happy Women's Day 🌸</h1>

        <p>
            Dear <span class="name">Anushree</span>,
        </p>

        <p>
            Tum meri life ki sabse beautiful feeling ho.
            Tumhari smile meri duniya ko bright bana deti hai ✨

            Strong bhi ho, caring bhi ho
            aur meri life ki **sabse special woman** bhi.

            Thank you for being you. 💖
        </p>

        <p>
            Forever Yours ❤️
            <br><b>Anurag</b>
        </p>

    </div>

    <script>

        function showWish() {
            document.getElementById("btn").style.display = "none";
            document.getElementById("wish").style.display = "block";
        }

        /* Floating hearts generator */

        for (let i = 0; i < 35; i++) {

            let heart = document.createElement("div");

            heart.innerHTML = "❤";
            heart.className = "heart";

            heart.style.left = Math.random() * 100 + "vw";

            heart.style.animationDuration = (4 + Math.random() * 4) + "s";

            heart.style.fontSize = (18 + Math.random() * 22) + "px";

            document.body.appendChild(heart);

        }

    </script>

</body>

</html>
